name: Aggiorna pubblicazioni da PubMed

on:
  schedule:
    # ogni lunedì alle 05:00 UTC
    - cron: "0 5 * * 1"
  workflow_dispatch: {}   # permette di lanciarlo anche a mano da GitHub

jobs:
  update-pubmed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Interroga PubMed e rigenera pubblicazioni.json
        env:
          ORCID: ${{ secrets.PUBMED_ORCID }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/update_pubmed.py

      - name: Commit se ci sono cambiamenti
        run: |
          git config user.name "pubmed-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/pubblicazioni/pubblicazioni.json
          git diff --cached --quiet || git commit -m "chore: aggiorna pubblicazioni da PubMed"
          git push
