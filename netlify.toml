[build]
  command = "npm run build"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Le pagine con estensione .html restano navigabili senza estensione, es. /didattica
[[redirects]]
  from = "/didattica"
  to = "/didattica.html"
  status = 200

[[redirects]]
  from = "/ricerca"
  to = "/ricerca.html"
  status = 200

[[redirects]]
  from = "/clinica"
  to = "/clinica.html"
  status = 200

[[redirects]]
  from = "/galleria"
  to = "/galleria.html"
  status = 200

[[redirects]]
  from = "/chi-sono"
  to = "/chi-sono.html"
  status = 200
