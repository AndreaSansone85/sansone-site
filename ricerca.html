<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ricerca — Andrea Sansone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="/">Andrea Sansone<small>Sexual Medicine · Andrology · Endocrinology</small></a>
    <button class="nav-toggle" aria-expanded="false" aria-label="Menu">☰</button>
    <nav class="main-nav" aria-label="Principale">
      <a href="/chi-sono" data-it="Chi sono" data-en="About">Chi sono</a>
      <a href="/ricerca" aria-current="page" data-it="Ricerca" data-en="Research">Ricerca</a>
      <a href="/clinica" data-it="Clinica" data-en="Clinic">Clinica</a>
      <a href="/didattica" data-it="Didattica" data-en="Teaching">Didattica</a>
      <a href="/galleria" data-it="Galleria" data-en="Gallery">Galleria</a>
      <div class="lang-toggle" data-lang-toggle>
        <button data-lang="it" aria-pressed="true">IT</button>
        <button data-lang="en" aria-pressed="false">EN</button>
      </div>
    </nav>
  </div>
</header>

<main>
  <section class="hero" style="padding-bottom:2rem;">
    <div class="wrap">
      <span class="eyebrow" data-it="Ricerca" data-en="Research">Ricerca</span>
      <h1 data-it="Pubblicazioni e attività congressuale" data-en="Publications and conference activity">Pubblicazioni e attività congressuale</h1>
    </div>
  </section>

  <section class="block">
    <div class="wrap">
      <h2 data-it="Pubblicazioni" data-en="Publications">Pubblicazioni</h2>
      <div class="pub-controls">
        <input type="search" id="pub-search" placeholder="Cerca per titolo, autore, rivista…" data-it-placeholder aria-label="Cerca pubblicazioni" />
        <select id="pub-year" aria-label="Filtra per anno"><option value="">Tutti gli anni</option></select>
      </div>
      <p class="pub-meta" id="pub-meta"></p>
      <ol class="pub-list" id="pub-list"></ol>
    </div>
  </section>

  <section class="block">
    <div class="wrap">
      <h2 data-it="Congressi e relazioni" data-en="Conferences and talks">Congressi e relazioni</h2>
      <div id="congressi-list" class="grid grid-2"></div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap">
    <span>&copy; <span id="year"></span> Andrea Sansone</span>
    <span data-it="Università di Roma Tor Vergata · ENDOSEX" data-en="University of Rome Tor Vergata · ENDOSEX">Università di Roma Tor Vergata · ENDOSEX</span>
  </div>
</footer>

<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
<script src="/assets/js/app.js"></script>
<script src="/assets/js/pubblicazioni.js"></script>
<script>
(function () {
  fetch('/content/congressi/index.json').then(r => r.json()).then(data => {
    const items = data.items || [];
    function render() {
      const lang = window.getCurrentLang();
      const wrap = document.getElementById('congressi-list');
      if (!items.length) {
        wrap.innerHTML = `<p data-it="Nessuna voce inserita ancora." data-en="No entries yet.">${lang === 'it' ? 'Nessuna voce inserita ancora.' : 'No entries yet.'}</p>`;
        return;
      }
      wrap.innerHTML = items.map(it => `
        <div class="card">
          <span class="tag" style="font-family:var(--font-mono);font-size:.7rem;color:var(--accent);text-transform:uppercase;">${it.tipo || ''}</span>
          <h3>${lang === 'it' ? it.titolo_it : (it.titolo_en || it.titolo_it)}</h3>
          <p style="color:var(--ink-soft);margin-bottom:0.3rem;">${it.evento || ''} — ${it.luogo || ''}</p>
          <p style="font-family:var(--font-mono);font-size:0.8rem;color:var(--ink-soft);">${it.data ? new Date(it.data).toLocaleDateString(lang === 'it' ? 'it-IT' : 'en-GB') : ''}</p>
          ${it.link ? `<a href="${it.link}" target="_blank" rel="noopener">${lang === 'it' ? 'Approfondisci' : 'More'}</a>` : ''}
        </div>
      `).join('');
    }
    render();
    document.addEventListener('langchange', render);
  }).catch(() => {
    document.getElementById('congressi-list').innerHTML = '<p>—</p>';
  });
})();
</script>
</body>
</html>
